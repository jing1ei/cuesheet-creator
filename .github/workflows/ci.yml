name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python tests/test_core.py

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install .

      - name: Verify console entry point
        run: cuesheet-creator --version

      - name: Verify selfcheck JSON output
        run: |
          output=$(cuesheet-creator selfcheck --output-format json 2>/dev/null || true)
          echo "$output" | python -c "import sys, json; json.load(sys.stdin); print('OK: selfcheck JSON parseable')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check scripts/ tests/

      - name: Validate built-in templates
        run: |
          pip install -r requirements.txt
          python -c "
          import json, sys
          sys.path.insert(0, 'scripts')
          import cuesheet_creator as cc
          for name in ['production', 'music-director', 'script']:
              tmpl = cc.get_template_definition(name)
              errors = cc.validate_template_json(tmpl)
              if errors:
                  print(f'FAIL: {name}: {errors}')
                  sys.exit(1)
              print(f'OK: {name}')
          "
